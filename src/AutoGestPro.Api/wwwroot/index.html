<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoGestPro | Clientes</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="presentation-stage">
    <header class="module-heading">
      <span class="step-badge">3</span>
      <div>
        <h1>CLIENTES</h1>
        <p>Consulta, agrega o edita<br>la informacion de clientes.</p>
      </div>
    </header>

    <section class="client-card" aria-label="Modulo de clientes">
      <div class="card-header">
        <h2>Clientes</h2>
      </div>

      <div class="card-toolbar">
        <label class="search-box">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </svg>
          <input id="searchInput" type="search" placeholder="Buscar cliente...">
        </label>

        <button class="primary-button" id="newClientButton" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5v14"></path>
            <path d="M5 12h14"></path>
          </svg>
          Agregar Cliente
        </button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Telefono</th>
              <th>Correo</th>
              <th class="actions-column">Acciones</th>
            </tr>
          </thead>
          <tbody id="clientsBody"></tbody>
        </table>
      </div>

      <div class="empty-state" id="emptyState" hidden>
        <strong>No hay clientes para mostrar</strong>
      </div>

      <footer class="table-footer">
        <span id="pageInfo">Pagina 1 de 1</span>
        <div class="pager">
          <button class="icon-button" id="prevPageButton" type="button" aria-label="Pagina anterior">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m15 18-6-6 6-6"></path>
            </svg>
          </button>
          <button class="icon-button" id="nextPageButton" type="button" aria-label="Pagina siguiente">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m9 18 6-6-6-6"></path>
            </svg>
          </button>
        </div>
      </footer>
    </section>
  </main>

  <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>
  <aside class="drawer" id="clientDrawer" aria-hidden="true" aria-label="Formulario de cliente">
    <form id="clientForm" class="drawer-form">
      <header class="drawer-header">
        <div>
          <p id="drawerMode">Registro</p>
          <h2 id="drawerTitle">Nuevo cliente</h2>
        </div>
        <button class="icon-button" id="closeDrawerButton" type="button" aria-label="Cerrar">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
      </header>

      <input id="clientId" type="hidden">

      <div class="form-grid">
        <label>
          Tipo de cliente
          <select id="idTipoCliente" required></select>
        </label>
        <label>
          Tipo documento
          <select id="tipoDocumento" required>
            <option value="CED">CED</option>
            <option value="RNC">RNC</option>
            <option value="PAS">PAS</option>
          </select>
        </label>
        <label>
          Nombres
          <input id="nombres" type="text" maxlength="100" required>
        </label>
        <label>
          Apellidos
          <input id="apellidos" type="text" maxlength="100" required>
        </label>
        <label class="span-2">
          Razon social
          <input id="razonSocial" type="text" maxlength="200">
        </label>
        <label>
          Numero documento
          <input id="numeroDocumento" type="text" maxlength="20" required>
        </label>
        <label>
          Telefono
          <input id="telefono" type="tel" maxlength="20" required>
        </label>
        <label>
          Telefono alternativo
          <input id="telefonoAlternativo" type="tel" maxlength="20">
        </label>
        <label>
          Correo
          <input id="correoElectronico" type="email" maxlength="150">
        </label>
        <label class="check-row" id="activeField">
          <input id="activo" type="checkbox">
          <span>Cliente activo</span>
        </label>
      </div>

      <footer class="drawer-actions">
        <button class="secondary-button" id="cancelButton" type="button">Cancelar</button>
        <button class="primary-button" id="saveButton" type="submit">
          Guardar
        </button>
      </footer>
    </form>
  </aside>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script src="/app.js" defer></script>
</body>
</html>
