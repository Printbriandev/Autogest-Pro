<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoGestPro | Clientes</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Navegacion principal">
      <a class="brand" href="/" aria-label="AutoGestPro">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" role="img">
            <path d="M16 3 27 8v8c0 7-4.8 11.2-11 13-6.2-1.8-11-6-11-13V8l11-5Z"></path>
            <path d="M10 18h12l-2-6h-8l-2 6Z"></path>
            <path d="M11 20h2m6 0h2"></path>
          </svg>
        </span>
        <span>
          <strong>AutoGestPro</strong>
          <small>Taller mecanico</small>
        </span>
      </a>

      <nav class="nav-list" aria-label="Modulos">
        <a class="nav-item active" href="/">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          Clientes
        </a>
        <a class="nav-item muted" href="/swagger">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"></path>
            <path d="M14 2v6h6"></path>
            <path d="M8 13h8"></path>
            <path d="M8 17h5"></path>
          </svg>
          Swagger
        </a>
      </nav>
    </aside>

    <main class="workspace">
      <header class="page-header">
        <div>
          <p class="eyebrow">CRM de taller</p>
          <h1>Clientes</h1>
        </div>
        <button class="primary-button" id="newClientButton" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5v14"></path>
            <path d="M5 12h14"></path>
          </svg>
          Nuevo cliente
        </button>
      </header>

      <section class="summary-grid" aria-label="Resumen de clientes">
        <article class="metric-tile">
          <span>Total</span>
          <strong id="metricTotal">0</strong>
        </article>
        <article class="metric-tile">
          <span>Activos en vista</span>
          <strong id="metricActive">0</strong>
        </article>
        <article class="metric-tile">
          <span>Inactivos en vista</span>
          <strong id="metricInactive">0</strong>
        </article>
      </section>

      <section class="toolbar" aria-label="Filtros">
        <label class="search-box">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </svg>
          <input id="searchInput" type="search" placeholder="Buscar por nombre, documento o correo">
        </label>
        <button class="secondary-button" id="refreshButton" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
            <path d="M3 21v-5h5"></path>
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
            <path d="M16 8h5V3"></path>
          </svg>
          Actualizar
        </button>
      </section>

      <section class="data-panel" aria-live="polite">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Cliente</th>
                <th>Documento</th>
                <th>Telefono</th>
                <th>Correo</th>
                <th>Estado</th>
                <th class="actions-column">Acciones</th>
              </tr>
            </thead>
            <tbody id="clientsBody"></tbody>
          </table>
        </div>

        <div class="empty-state" id="emptyState" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
          </svg>
          <strong>No hay clientes para mostrar</strong>
        </div>

        <footer class="table-footer">
          <span id="pageInfo">Pagina 1 de 1</span>
          <div class="pager">
            <button class="icon-button" id="prevPageButton" type="button" aria-label="Pagina anterior">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m15 18-6-6 6-6"></path>
              </svg>
            </button>
            <button class="icon-button" id="nextPageButton" type="button" aria-label="Pagina siguiente">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m9 18 6-6-6-6"></path>
              </svg>
            </button>
          </div>
        </footer>
      </section>
    </main>
  </div>

  <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>
  <aside class="drawer" id="clientDrawer" aria-hidden="true" aria-label="Formulario de cliente">
    <form id="clientForm" class="drawer-form">
      <header class="drawer-header">
        <div>
          <p class="eyebrow" id="drawerMode">Registro</p>
          <h2 id="drawerTitle">Nuevo cliente</h2>
        </div>
        <button class="icon-button" id="closeDrawerButton" type="button" aria-label="Cerrar">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
      </header>

      <input id="clientId" type="hidden">

      <div class="form-grid">
        <label>
          Tipo de cliente
          <select id="idTipoCliente" required></select>
        </label>
        <label>
          Tipo documento
          <select id="tipoDocumento" required>
            <option value="CED">CED</option>
            <option value="RNC">RNC</option>
            <option value="PAS">PAS</option>
          </select>
        </label>
        <label>
          Nombres
          <input id="nombres" type="text" maxlength="100" required>
        </label>
        <label>
          Apellidos
          <input id="apellidos" type="text" maxlength="100" required>
        </label>
        <label class="span-2">
          Razon social
          <input id="razonSocial" type="text" maxlength="200">
        </label>
        <label>
          Numero documento
          <input id="numeroDocumento" type="text" maxlength="20" required>
        </label>
        <label>
          Telefono
          <input id="telefono" type="tel" maxlength="20" required>
        </label>
        <label>
          Telefono alternativo
          <input id="telefonoAlternativo" type="tel" maxlength="20">
        </label>
        <label>
          Correo
          <input id="correoElectronico" type="email" maxlength="150">
        </label>
        <label class="check-row" id="activeField">
          <input id="activo" type="checkbox">
          <span>Cliente activo</span>
        </label>
      </div>

      <footer class="drawer-actions">
        <button class="secondary-button" id="cancelButton" type="button">Cancelar</button>
        <button class="primary-button" id="saveButton" type="submit">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path>
            <path d="M17 21v-8H7v8"></path>
            <path d="M7 3v5h8"></path>
          </svg>
          Guardar
        </button>
      </footer>
    </form>
  </aside>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script src="/app.js" defer></script>
</body>
</html>
